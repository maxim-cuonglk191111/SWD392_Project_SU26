# Docker Compose đọc file .env ở cùng thư mục (đã git-ignored)
# copy .env.example → .env và điền credentials

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: monolit
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - AGORA_APP_ID=${AGORA_APP_ID}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
      - LMS_SERVICE_URL=http://localhost:8081
      - IDENTITY_SERVICE_URL=http://localhost:5064
    volumes:
      - uploads_data:/app/uploads
      - identity_data:/app/identity
      - lms_data:/app/lms

volumes:
  uploads_data:
  identity_data:
  lms_data:
